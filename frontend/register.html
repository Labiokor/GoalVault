<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalVault | Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col" data-page="register">

  <header class="fixed top-0 w-full bg-slate-50/70 backdrop-blur-xl z-50">
    <nav class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
      <h1 class="text-2xl font-black tracking-tighter text-primary font-headline">GoalVault</h1>
    </nav>
  </header>

  <main class="flex-grow flex flex-col items-center justify-center pt-24 pb-12 px-6">
    <div class="w-full max-w-md">
      <div class="bg-surface-container-lowest rounded-lg p-10 border border-outline-variant/10"
           style="box-shadow: 0 12px 60px -12px rgba(45,51,53,0.08)">

        <div class="mb-10">
          <h2 class="font-headline font-bold text-3xl tracking-tight text-on-background mb-2">Create your sanctuary</h2>
          <p class="text-on-surface-variant text-sm">Start your productive journey today</p>
        </div>

        <!-- Error message -->
        <div id="auth-error" class="hidden mb-6 p-4 bg-error-container/20 text-error rounded-lg text-sm font-medium"></div>

        <form id="register-form" class="space-y-6">
          <div class="space-y-1.5">
            <label class="form-label" for="name">Full Name</label>
            <input class="form-input" id="name" type="text" placeholder="Alex Mills" required>
          </div>

          <div class="space-y-1.5">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" id="email" type="email" placeholder="you@example.com" required>
          </div>

          <div class="space-y-1.5">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" id="password" type="password" placeholder="••••••••" required>
          </div>

          <div class="space-y-1.5">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input class="form-input" id="confirm-password" type="password" placeholder="••••••••" required>
          </div>

          <button class="w-full vault-gradient text-on-primary py-4 rounded font-semibold text-sm tracking-wide hover:opacity-95 active:scale-[0.98] transition-all"
                  type="submit" id="register-btn">
            Create Account
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-sm text-on-surface-variant">
            Already have an account?
            <a class="text-primary font-semibold hover:underline ml-1" href="/login.html">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/modules/auth.js"></script>
</body>
</html>
