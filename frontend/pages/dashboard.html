<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalVault | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body class="bg-surface text-on-surface" data-page="dashboard">

  <!-- Sidebar injected by JS -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Topbar injected by JS -->
  <header class="topbar" id="top-bar"></header>

  <!-- Main Content -->
  <main class="main-content px-8" id="main-content">
    <!-- Dashboard content injected by dashboard.js -->
    <div id="dashboard-root"></div>
  </main>

  <!-- FAB -->
  <button class="fab" id="fab">
    <span class="material-symbols-outlined text-3xl">add</span>
  </button>

  <!-- Scripts -->
  <script type="module" src="../js/main.js"></script>
  <script type="module" src="../js/modules/dashboard.js"></script>
</body>
</html>
